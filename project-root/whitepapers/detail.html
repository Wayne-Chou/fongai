<!doctype html>
<html lang="zh-Hant">
  <head>
    <load src="/partials/head.html" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>

  <body class="page-whitepaper-detail">
    <load src="/partials/header.html" />

    <main>
      <section class="detail-hero-section">
        <div class="container">
          <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
              <li class="breadcrumb-item">
                <a href="/whitepapers/" data-i18n="wp.breadcrumb.list"
                  >白皮書系列</a
                >
              </li>
              <li class="breadcrumb-item" id="breadcrumb-active">載入中...</li>
            </ol>
          </nav>

          <div class="hero-flex">
            <div class="hero-text">
              <span class="badge-year" id="detail-year"></span>
              <h1 class="detail-title" id="detail-title">載入中...</h1>
              <p class="detail-subtitle" id="detail-date"></p>
            </div>
          </div>
        </div>
      </section>

      <section class="detail-main-content">
        <div class="container">
          <div class="row g-5">
            <div class="col-lg-7">
              <div class="content-card" data-reveal>
                <div class="card-tag" data-i18n="wp.detail.tag">
                  REPORT OVERVIEW
                </div>
                <div id="detail-content" class="rich-text-area"></div>
                <hr class="my-5 border-secondary opacity-25" />
                <div id="apply-content" class="apply-highlights"></div>
              </div>
            </div>

            <div class="col-lg-5">
              <div class="sticky-form-container">
                <div class="form-card">
                  <div class="form-header">
                    <h3 data-i18n="wp.form.title">免費獲取完整報告</h3>
                    <p data-i18n="wp.form.subtitle">
                      填寫資訊後，系統將寄送電子檔至您的信箱
                    </p>
                  </div>

                  <form
                    id="whitepaperApplyForm"
                    action="https://formspree.io/f/mwvwovak"
                    method="POST"
                  >
                    <div class="input-group-custom">
                      <label data-i18n="wp.form.name">您的姓名</label>
                      <input
                        type="text"
                        name="姓名"
                        data-i18n-placeholder="wp.form.placeholder.name"
                        placeholder="例如：王小明"
                        required
                      />
                    </div>
                    <div class="input-group-custom">
                      <label data-i18n="wp.form.company">公司名稱</label>
                      <input
                        type="text"
                        name="公司名稱"
                        placeholder="例如：數位發展部、○○有限公司"
                        data-i18n-placeholder="wp.form.placeholder.company"
                        required
                      />
                    </div>
                    <div class="input-group-custom">
                      <label>
                        <span data-i18n="wp.form.line">LINE ID</span>
                        <span class="optional-text" data-i18n="wp.form.optional"
                          >(選填)</span
                        >
                      </label>
                      <input
                        type="text"
                        id="line-id"
                        name="LineID"
                        placeholder="例如：@fongai_service"
                        data-i18n-placeholder="wp.form.placeholder.line"
                      />
                    </div>
                    <div class="input-group-custom">
                      <label data-i18n="wp.form.job">職稱</label>
                      <input
                        type="text"
                        name="職稱"
                        placeholder="例如：營運總監"
                        data-i18n-placeholder="wp.form.placeholder.job"
                        required
                      />
                    </div>
                    <div class="input-group-custom">
                      <label data-i18n="wp.form.email">公司信箱</label>
                      <input
                        type="email"
                        name="email"
                        placeholder="name@company.com"
                        data-i18n-placeholder="wp.form.placeholder.email"
                        required
                      />
                    </div>

                    <button
                      type="submit"
                      class="apply-btn-submit"
                      data-i18n="wp.form.submit"
                    >
                      立即申請下載
                    </button>
                  </form>
                  <div
                    id="applySuccess"
                    style="display: none"
                    class="text-center py-5"
                  >
                    <div class="mb-4">
                      <i
                        class="bi bi-clock-history text-primary"
                        style="font-size: 3rem"
                      ></i>
                    </div>
                    <h3 data-i18n="wp.form.pending_title">申請已送出</h3>
                    <p
                      class="text-secondary"
                      data-i18n="wp.form.pending_subtitle"
                    >
                      您的申請正在等待審核中，通過後系統將寄送通知至您的信箱。
                    </p>
                    <button
                      type="button"
                      class="btn btn-outline-primary mt-4"
                      onclick="location.href = './index.html'"
                      data-i18n="wp.form.back_to_list"
                    >
                      返回列表
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <load src="/partials/footer.html" />
    <script src="/js/whitepapers-data.js"></script>
    <script src="/js/main.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const slug = new URLSearchParams(window.location.search).get("slug");
        const paper = whitepapersData.find((item) => item.slug === slug);

        if (paper) {
          const lang = localStorage.getItem("lang") || "zh";

          const titleEl = document.getElementById("detail-title");
          const breadcrumbEl = document.getElementById("breadcrumb-active");

          [titleEl, breadcrumbEl].forEach((el) => {
            el.setAttribute("data-dynamic-i18n", "");
            el.setAttribute("data-zh", paper.title);
            el.setAttribute("data-en", paper.title_en);
            el.setAttribute("data-ja", paper.title_ja);
            el.innerText =
              lang === "zh"
                ? paper.title
                : paper[`title_${lang}`] || paper.title;
          });

          document.title = `${paper.title} | 產業白皮書`;

          const dateEl = document.getElementById("detail-date");

          dateEl.setAttribute("data-dynamic-i18n", "");
          dateEl.setAttribute("data-zh", `發佈日期：${paper.date}`);
          dateEl.setAttribute("data-en", `Published: ${paper.date}`);
          dateEl.setAttribute("data-ja", `公開日：${paper.date}`);

          if (lang === "en") {
            dateEl.innerText = `Published: ${paper.date}`;
          } else if (lang === "ja") {
            dateEl.innerText = `公開日：${paper.date}`;
          } else {
            dateEl.innerText = `發佈日期：${paper.date}`;
          }
          const contentEl = document.getElementById("detail-content");
          contentEl.setAttribute("data-dynamic-i18n-html", "");
          contentEl.setAttribute("data-zh", paper.content);
          contentEl.setAttribute("data-en", paper.content_en);
          contentEl.setAttribute("data-ja", paper.content_ja);
          contentEl.innerHTML =
            lang === "zh"
              ? paper.content
              : paper[`content_${lang}`] || paper.content;

          const applyEl = document.getElementById("apply-content");
          applyEl.setAttribute("data-dynamic-i18n-html", "");
          applyEl.setAttribute("data-zh", paper.applyContent);
          applyEl.setAttribute("data-en", paper.applyContent_en);
          applyEl.setAttribute("data-ja", paper.applyContent_ja);
          applyEl.innerHTML =
            lang === "zh"
              ? paper.applyContent
              : paper[`applyContent_${lang}`] || paper.applyContent;
        } else {
          window.location.href = "/whitepapers/";
        }

        const form = document.getElementById("whitepaperApplyForm");
        const success = document.getElementById("applySuccess");
        form.addEventListener("submit", async function (e) {
          e.preventDefault();

          const formData = new FormData(this);

          try {
            const response = await fetch(this.action, {
              method: "POST",
              body: formData,
              headers: {
                Accept: "application/json",
              },
            });

            if (response.ok) {
              form.style.display = "none";
              success.style.display = "block";

              window.scrollTo({ top: 0, behavior: "smooth" });
            } else {
              alert("送出失敗，請稍後再試。");
            }
          } catch (error) {
            alert("網路異常，請檢查連線。");
          }
        });
      });
    </script>
  </body>
</html>
