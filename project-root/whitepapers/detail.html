<!doctype html>
<html lang="zh-Hant">
  <head>
    <load src="/partials/head.html" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>

  <body class="page-whitepaper-detail">
    <load src="/partials/header.html" />

    <main>
      <section class="detail-hero-section">
        <div class="container">
          <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
              <li class="breadcrumb-item">
                <a href="/whitepapers/">白皮書系列</a>
              </li>
              <li class="breadcrumb-item" id="breadcrumb-active">載入中...</li>
            </ol>
          </nav>

          <div class="hero-flex">
            <div class="hero-text">
              <span class="badge-year" id="detail-year">2026</span>
              <h1 class="detail-title" id="detail-title">載入中...</h1>
              <p class="detail-subtitle" id="detail-date"></p>
            </div>
          </div>
        </div>
      </section>

      <section class="detail-main-content">
        <div class="container">
          <div class="row g-5">
            <div class="col-lg-7">
              <div class="content-card" data-reveal>
                <div class="card-tag">REPORT OVERVIEW</div>
                <div id="detail-content" class="rich-text-area"></div>

                <hr class="my-5 border-secondary opacity-25" />

                <div id="apply-content" class="apply-highlights"></div>
              </div>
            </div>

            <div class="col-lg-5">
              <div class="sticky-form-container">
                <div class="form-card">
                  <div class="form-header">
                    <h3>免費獲取完整報告</h3>
                    <p>填寫資訊後，系統將寄送電子檔至您的信箱</p>
                  </div>

                  <form id="whitepaperApplyForm">
                    <div class="input-group-custom">
                      <label>您的姓名</label>
                      <input type="text" placeholder="例如：王小明" required />
                    </div>
                    <div class="input-group-custom">
                      <label>公司名稱</label>
                      <input
                        type="text"
                        placeholder="例如：數位發展部、○○有限公司"
                        required
                      />
                    </div>
                    <div class="input-group-custom">
                      <label
                        >LINE ID
                        <span class="optional-text">(選填)</span></label
                      >
                      <input
                        type="text"
                        id="line-id"
                        placeholder="例如：@fongai_service"
                      />
                    </div>
                    <div class="input-group-custom">
                      <label>職稱</label>
                      <input
                        type="text"
                        placeholder="例如：營運總監"
                        required
                      />
                    </div>
                    <div class="input-group-custom">
                      <label>公司信箱</label>
                      <input
                        type="email"
                        placeholder="name@company.com"
                        required
                      />
                    </div>

                    <button type="submit" class="apply-btn-submit">
                      立即申請下載 <i class="bi bi-download ms-2"></i>
                    </button>
                  </form>

                  <div class="apply-success" id="applySuccess">
                    <div class="success-icon">
                      <i class="bi bi-check-circle-fill"></i>
                    </div>
                    <h4>申請已成功送出</h4>
                    <p>
                      感謝您的關注。報告將在 1
                      分鐘內寄送至您的信箱，請查收信件（含垃圾信夾）。
                    </p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <load src="/partials/footer.html" />
    <script src="/js/whitepapers-data.js"></script>
    <script src="/js/main.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const slug = new URLSearchParams(window.location.search).get("slug");
        const paper = whitepapersData.find((item) => item.slug === slug);

        if (paper) {
          document.title = `${paper.title} | 產業白皮書`;
          document.getElementById("breadcrumb-active").innerText = paper.title;
          document.getElementById("detail-title").innerText = paper.title;
          document.getElementById("detail-date").innerText =
            `發佈日期：${paper.date}`;
          document.getElementById("detail-year").innerText = paper.year;
          document.getElementById("detail-content").innerHTML = paper.content;
          document.getElementById("apply-content").innerHTML =
            paper.applyContent;
        } else {
          window.location.href = "/whitepapers/";
        }

        const form = document.getElementById("whitepaperApplyForm");
        const success = document.getElementById("applySuccess");
        form.addEventListener("submit", function (e) {
          e.preventDefault();
          form.style.display = "none";
          success.style.display = "block";
          // 這裡可以串接 API
        });
      });
    </script>
  </body>
</html>
