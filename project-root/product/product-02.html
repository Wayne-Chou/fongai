<!doctype html>
<html lang="zh-Hant">
  <head>

  <body class="page-product02">
    <load src="/partials/header.html" />

    <main>
      <!-- Hero Banner -->
      <section class="product-banner">
        <img
          src="https://fongai.co/wp-content/uploads/2023/12/2927b2_b9f6404b0dd14bf387eb22b24febdf95mv2-1024x278.webp"
          alt=""
        />

      <!-- 標題 -->
      <section class="product-hero center">
        <div class="container">
          <h1 class="product-title blue">運動地墊遊戲平台</h1>
        </div>
      </section>

      <!-- 產品理念 -->
      <section class="product-intro">
        <div class="container">
          <blockquote class="intro-quote">
            從「嚴肅遊戲」的角度，將運動及復健內容遊戲化，
            結合認知訓練、互動競爭及聲光刺激回饋， 提高長者參與活動意願。
            <br /><br />
            透過客製化遊戲內容， 亦可應用於幼兒學習及運動訓練領域。
          </blockquote>
        </div>
      </section>

      <!-- 影片 -->
      <section class="product-video">
        <div class="container video-wrapper">
          <iframe
            src="https://www.youtube.com/embed/IvEkknZbFmw"
            title="WhizToys運動地墊遊戲平台"
            allowfullscreen
          >
          </iframe>
        </div>
      </section>

      <!-- 主圖片 -->
      <section class="product-image-section">
        <div class="container">
          <img
            src="https://fongai.co/wp-content/uploads/2023/12/toys-pic_3_11-1024x386.webp"
            alt=""
          />
        </div>
      </section>

      <!-- 圖片展示區（取代 Smart Slider） -->
      <section class="product-gallery">
        <div class="container">
          <h2 class="section-title">功能展示</h2>

          <div class="gallery-grid">

              alt=""

              alt=""
            />

              src="https://fongai.co/wp-content/uploads/slider/cache/ef424e585b7dabc5f93631ca57154c88/IMG_0872.png"

              alt=""
