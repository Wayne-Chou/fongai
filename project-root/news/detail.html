<!doctype html>
<html lang="zh-Hant">
  <head>
    <load src="/partials/head.html" />

    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body class="page-article-detail">
    <load src="/partials/header.html" />

    <main>
      <section class="detail-hero">
        <div class="container">
          <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
              <li class="breadcrumb-item">
                <a href="/news/news.html" class="text-decoration-none" data-i18n="archive.hero.title">資訊與案例</a>
              </li>
              <li
                class="breadcrumb-item active"
                id="breadcrumb-active"
                aria-current="page"
              >
                載入中...
              </li>
            </ol>
          </nav>
          <div class="detail-header-content ">
            
            <h1 class=" fw-bold " id="detail-title">
              文章標題載入中...
            </h1>
            <div
              class="article-meta d-flex align-items-center gap-4 text-muted"
            >
             
              
            </div>
          </div>
        </div>
      </section>

      <section class="article-body-section ">
        <div class="container">
          <div>
            <div  id="article-main-col">
              <div class="main-article-img mb-5">
                <img
                  src=""
                  id="detail-image"
                  class="img-fluid rounded-4 shadow-sm"
                  alt="article banner"
                />
              </div>

              <div
                class="article-content fs-5 leading-relaxed"
                id="detail-content"
              >
                <p class="text-muted">正在為您準備內容...</p>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <load src="/partials/footer.html" />

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../js/articles-data.js"></script>
    <script src="../js/main.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const urlParams = new URLSearchParams(window.location.search);
        const articleId = urlParams.get("id");
      
        if (typeof articlesData === "undefined") {
          console.error("找不到 articles-data.js 檔案");
          return;
        }
      
        const article = articlesData.find((item) => item.id === articleId);
      
        if (article) {
          const lang = localStorage.getItem("lang") || "zh";
      
         
          const titleEl = document.getElementById("detail-title");
      
          titleEl.setAttribute("data-dynamic-i18n", "");
          titleEl.setAttribute("data-zh", article.title_zh);
          titleEl.setAttribute("data-en", article.title_en || article.title_zh);
          titleEl.setAttribute("data-ja", article.title_ja || article.title_zh);
      
          titleEl.innerText = article[`title_${lang}`] || article.title_zh;
      
        
          document.title = `${titleEl.innerText} | 建豐健康科技 FongAI`;
      
          
          const breadcrumbEl = document.getElementById("breadcrumb-active");
      
          breadcrumbEl.setAttribute("data-dynamic-i18n", "");
          breadcrumbEl.setAttribute("data-zh", article.title_zh);
          breadcrumbEl.setAttribute("data-en", article.title_en || article.title_zh);
          breadcrumbEl.setAttribute("data-ja", article.title_ja || article.title_zh);
      
          breadcrumbEl.innerText = article[`title_${lang}`] || article.title_zh;
      
         
          
      
         
          
      
         
          const imgElement = document.getElementById("detail-image");
      
          if (article.showDetailImage === false) {
            imgElement.parentElement.style.display = "none";
          } else {
            imgElement.src = article.detailImage || article.image;
            imgElement.alt = article.title_zh;
          }
      
          
          const contentEl = document.getElementById("detail-content");
      
          contentEl.setAttribute("data-dynamic-i18n-html", "");
          contentEl.setAttribute("data-zh", article.content_zh);
          contentEl.setAttribute("data-en", article.content_en || article.content_zh);
          contentEl.setAttribute("data-ja", article.content_ja || article.content_zh);
      
          contentEl.innerHTML = article[`content_${lang}`] || article.content_zh;
      
          
          if (window.loadLang) {
            window.loadLang(lang);
          }
      
        } else {
          document.getElementById("detail-title").innerText = "文章不存在";
          document.getElementById("article-main-col").innerHTML = `
            <div class="text-center py-5">
              <h2 class="text-muted">抱歉，找不到該文章內容。</h2>
              <p>它可能已被移動或移除。</p>
              <a href="index.html" class="btn btn-primary rounded-pill mt-3">回文章列表</a>
            </div>
          `;
        }
      });
      </script>
  </body>
</html>
