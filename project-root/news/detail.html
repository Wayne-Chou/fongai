<!doctype html>
<html lang="zh-Hant">
  <head>
    <load src="/partials/head.html" />

    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body class="page-article-detail">
    <load src="/partials/header.html" />

    <main>
      <section class="detail-hero">
        <div class="container">
          <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
              <li class="breadcrumb-item">
                <a href="index.html" class="text-decoration-none">資訊與案例</a>
              </li>
              <li
                class="breadcrumb-item active"
                id="breadcrumb-active"
                aria-current="page"
              >
                載入中...
              </li>
            </ol>
          </nav>
          <div class="detail-header-content mt-4">
            <span class="badge badge-category mb-3" id="detail-category"
              >分類</span
            >
            <h1 class="display-5 fw-bold mb-4" id="detail-title">
              文章標題載入中...
            </h1>
            <div
              class="article-meta d-flex align-items-center gap-4 text-muted"
            >
              <span id="detail-date"
                ><i class="bi bi-calendar3 me-2"></i>0000-00-00</span
              >
              <span><i class="bi bi-person me-2"></i>建豐編輯部</span>
            </div>
          </div>
        </div>
      </section>

      <section class="article-body-section py-5">
        <div class="container">
          <div class="row justify-content-center">
            <div class="col-lg-8" id="article-main-col">
              <div class="main-article-img mb-5">
                <img
                  src=""
                  id="detail-image"
                  class="img-fluid rounded-4 shadow-sm"
                  alt="article banner"
                />
              </div>

              <div
                class="article-content fs-5 leading-relaxed"
                id="detail-content"
              >
                <p class="text-muted">正在為您準備內容...</p>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <load src="/partials/footer.html" />

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../js/articles-data.js"></script>
    <script src="../js/main.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        // 1. 從網址取得 ID 參數 (detail.html?id=xxx)
        const urlParams = new URLSearchParams(window.location.search);
        const articleId = urlParams.get("id");

        // 檢查資料庫 articlesData 是否存在
        if (typeof articlesData === "undefined") {
          console.error("找不到 articles-data.js 檔案");
          return;
        }

        // 2. 尋找對應 ID 的文章物件
        const article = articlesData.find((item) => item.id === articleId);

        // 3. 渲染邏輯
        if (article) {
          // 替換網頁 Title
          document.title = `${article.title} | 建豐健康科技 FongAI`;

          // 替換標籤與麵包屑
          document.getElementById("breadcrumb-active").innerText =
            article.title;
          document.getElementById("detail-category").innerText =
            article.categoryName;

          // 替換標題與日期
          document.getElementById("detail-title").innerText = article.title;
          document.getElementById("detail-date").innerHTML =
            `<i class="bi bi-calendar3 me-2"></i>${article.date}`;

          // 替換圖片
          const imgElement = document.getElementById("detail-image");
          imgElement.src = article.image;
          imgElement.alt = article.title;

          // 替換主內容 (innerHTML 允許解析資料庫中的 <p>, <h3> 等標籤)
          document.getElementById("detail-content").innerHTML = article.content;
        } else {
          // 找不到文章時的處理
          document.getElementById("detail-title").innerText = "文章不存在";
          document.getElementById("article-main-col").innerHTML = `
            <div class="text-center py-5">
              <h2 class="text-muted">抱歉，找不到該文章內容。</h2>
              <p>它可能已被移動或移除。</p>
              <a href="index.html" class="btn btn-primary rounded-pill mt-3">回文章列表</a>
            </div>
          `;
        }
      });
    </script>
  </body>
</html>
