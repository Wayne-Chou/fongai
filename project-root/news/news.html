<!doctype html>
<html lang="zh-Hant">
  <head>
    <load src="../partials/head.html" />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body class="page-archive">
    <load src="../partials/header.html" />

    <main>
      <section class="archive-hero">
        <div class="container text-center" data-reveal>
          <div class="eyebrow">NEWS & CASES</div>
          <h1 class="hero-title fw-bold">
            資訊與<span class="text-gradient">案例</span>
          </h1>
          <p class="lead text-muted mx-auto" style="max-width: 600px">
            掌握最新的健康科技動態、專業醫學專欄，以及我們與各大機構合作的實踐成果。
          </p>
        </div>
      </section>

      <section class="archive-main-section">
        <div class="container">
          <div class="filter-wrapper mb-5">
            <div class="filter-scroll-container">
              <div class="filter-tags" id="filter-tags">
                <button class="filter-tag active" data-filter="all">
                  全部文章
                </button>
                <button class="filter-tag" data-filter="news">媒體報導</button>
                <button class="filter-tag" data-filter="health">
                  健康專欄
                </button>
                <button class="filter-tag" data-filter="service">
                  機構/企業案例
                </button>
                <button class="filter-tag" data-filter="tech">
                  AI 技術解析
                </button>
              </div>
            </div>
          </div>

          <div class="row g-4" id="article-list"></div>
        </div>
      </section>
      <nav class="mt-5">
        <ul class="pagination justify-content-center" id="pagination"></ul>
      </nav>
    </main>

    <load src="../partials/footer.html" />

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../js/main.js"></script>
    <script src="../js/animation.js"></script>

    <script src="../js/articles-data.js"></script>

    <script src="../js/article-engine.js"></script>
  </body>
</html>
