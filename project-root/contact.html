<!doctype html>
<html lang="zh-TW">
  <load src="/partials/head.html" />
  <body class="page-contact">
    <load src="/partials/header.html" />

    <main>
      <section class="contact-hero">
        <div class="container text-center" data-reveal>
          <div class="eyebrow mx-auto" data-i18n="contact.hero_eyebrow">
            CONTACT US
          </div>
          <h1 class="hero-title fw-bold">
            <span data-i18n="contact.hero_title_line1">與建豐</span
            ><span class="text-gradient" data-i18n="contact.hero_title_line2"
              >聯繫</span
            >
          </h1>
          <p
            class="lead text-muted mx-auto"
            style="max-width: 600px"
            data-i18n="contact.hero_desc"
          >
            無論您是醫療場域、照護據點或有志推廣預防醫學的夥伴，我們都歡迎您的諮詢與合作。
          </p>
        </div>
      </section>

      <section class="contact-main-section">
        <div class="container">
          <div class="row g-5">
            <div class="col-lg-5" data-reveal>
              <div class="contact-info-wrapper">
                <h3 class="fw-bold mb-4" data-i18n="contact.main_title">
                  聯繫資訊
                </h3>

                <div class="info-card">
                  <div class="info-item">
                    <div class="info-icon"><i class="bi bi-geo-alt"></i></div>
                    <div class="info-text">
                      <h6 data-i18n="contact.info_addr_label">公司地址</h6>
                      <p data-i18n="contact.info_addr_val">
                        臺灣臺北市內湖區瑞光路168號9F
                      </p>
                    </div>
                  </div>
                  <div class="info-item line-card">
                    <div class="info-icon line-bg">
                      <i class="bi bi-line"></i>
                    </div>
                    <div class="info-text">
                      <h6 data-i18n="contact.info_line_label">
                        官方 LINE 諮詢
                      </h6>
                      <a
                        href="https://lin.ee/gQGtodu"
                        target="_blank"
                        rel="noopener"
                        class="line-custom-btn"
                        data-i18n="contact.info_line_btn"
                      >
                        立即加入好友
                      </a>
                    </div>
                  </div>
                  <div class="info-item">
                    <div class="info-icon"><i class="bi bi-envelope"></i></div>
                    <div class="info-text">
                      <h6 data-i18n="contact.info_email_label">電子郵件</h6>
                      <p>service@fongai.co</p>
                    </div>
                  </div>
                  <div class="info-item">
                    <div class="info-icon"><i class="bi bi-telephone"></i></div>
                    <div class="info-text">
                      <h6 data-i18n="contact.info_tel_label">聯絡電話</h6>
                      <p>0938-932-306</p>
                    </div>
                  </div>
                </div>
                <div class="info-item">
                  <div class="info-icon">
                    <i class="bi bi-bank"></i>
                  </div>
                  <div class="info-text">
                    <h6 data-i18n="contact.info_tax_label">統一編號</h6>
                    <p>52564893</p>
                  </div>
                </div>
                <div class="map-container mt-4">
                  <iframe
                    width="100%"
                    height="250"
                    style="border: 0; border-radius: 20px"
                    loading="lazy"
                    allowfullscreen
                    referrerpolicy="no-referrer-when-downgrade"
                    src="https://www.google.com/maps?q=%E8%87%BA%E7%81%A3%E8%87%BA%E5%8C%97%E5%B8%82%E5%85%A7%E6%B9%96%E5%8D%80%E7%91%9E%E5%85%89%E8%B7%AF168%E8%99%9F&z=17&output=embed"
                  >
                  </iframe>
                </div>
              </div>
            </div>

            <div class="col-lg-7" data-reveal>
              <div class="contact-form-card">
                <h3 class="fw-bold mb-4" data-i18n="contact.form_title">
                  傳送訊息
                </h3>
                <form
                  id="contactForm"
                  action="https://formspree.io/f/mwvwovak"
                  method="POST"
                >
                  <div class="row g-3">
                    <div class="col-md-6">
                      <label
                        class="form-label"
                        data-i18n="contact.form_name_label"
                        >您的姓名</label
                      >
                      <input
                        type="text"
                        name="姓名"
                        class="form-control"
                        placeholder="姓名"
                        data-i18n-placeholder="contact.form_name_ph"
                        required
                      />
                    </div>
                    <div class="col-md-6">
                      <label
                        class="form-label"
                        data-i18n="contact.form_tel_label"
                        >聯絡電話</label
                      >
                      <input
                        type="tel"
                        name="電話"
                        class="form-control"
                        placeholder="電話"
                        data-i18n-placeholder="contact.form_tel_ph"
                        required
                      />
                    </div>
                    <div class="col-12">
                      <label
                        class="form-label"
                        data-i18n="contact.form_org_label"
                        >單位名稱</label
                      >
                      <input
                        type="text"
                        name="單位名稱"
                        class="form-control"
                        placeholder="例如：數位發展部、○○有限公司"
                        data-i18n-placeholder="contact.form_org_ph"
                        required
                      />
                    </div>
                    <div class="col-12">
                      <label
                        class="form-label"
                        data-i18n="contact.form_email_label"
                        >電子郵件</label
                      >
                      <input
                        type="email"
                        name="email"
                        class="form-control"
                        placeholder="example@mail.com"
                        data-i18n-placeholder="contact.form_email_ph"
                        required
                      />
                    </div>

                    <div class="col-12">
                      <label
                        class="form-label"
                        data-i18n="contact.form_msg_label"
                        >訊息內容</label
                      >
                      <textarea
                        name="訊息內容"
                        class="form-control"
                        rows="5"
                        placeholder="請輸入您的訊息..."
                        data-i18n-placeholder="contact.form_msg_ph"
                      ></textarea>
                    </div>

                    <input
                      type="hidden"
                      name="_subject"
                      value="新的聯絡我們表單提交 (FongAI Website)"
                    />

                    <div class="col-12 mt-4">
                      <button type="submit" class="btn btn-primary-jf w-100">
                        <span data-i18n="contact.form_btn">立即送出</span>
                        <i class="bi bi-send ms-2"></i>
                      </button>
                    </div>
                  </div>
                </form>
                <div
                  id="contactSuccess"
                  style="display: none"
                  class="text-center py-4"
                >
                  <div class="mb-3">
                    <i
                      class="bi bi-check-circle text-success"
                      style="font-size: 2rem"
                    ></i>
                  </div>
                  <h4 data-i18n="contact.success_title"></h4>
                  <p data-i18n="contact.success_msg"></p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <load src="/partials/footer.html" />

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module" src="/js/main.js"></script>
    <script type="module" src="/js/animation.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const contactForm = document.getElementById("contactForm");
        const contactSuccess = document.getElementById("contactSuccess");

        if (contactForm) {
          contactForm.addEventListener("submit", async function (e) {
            e.preventDefault();

            const formData = new FormData(this);

            try {
              const response = await fetch(this.action, {
                method: "POST",
                body: formData,
                headers: {
                  Accept: "application/json",
                },
              });

              if (response.ok) {
                contactForm.style.display = "none";

                if (contactSuccess) {
                  contactSuccess.style.display = "block";
                } else {
                  alert("訊息已送出，我們會盡快回覆您！");
                }
                window.scrollTo({
                  top: contactForm.offsetTop - 100,
                  behavior: "smooth",
                });
              } else {
                alert("送出失敗，請檢查網路連線或稍後再試。");
              }
            } catch (error) {
              alert("傳送發生錯誤，請稍後再試。");
            }
          });
        }
      });
    </script>
  </body>
</html>
